# Detect SSH connection
if-shell 'test -n "$SSH_CLIENT"' {
    # Changing the default prefix key
    unbind C-b
    set-option -g prefix C-a
    bind-key C-a send-prefix
} {
    # Mouse mode
    set -g mouse on

    # Move status to the top
    # set -g status-position top
}
#Changing the default bind key to C-a
    unbind C-b
    set-option -g prefix C-a
    bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %



# Change the text on the right
set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %b/%d %H:%M"

# Splitting panes
# Split vertically
# bind v split-window -h -c "#{pane_current_path}"
# Split horizontally
# bind h split-window -v -c "#{pane_current_path}"

# Resizing panes
# Prefix key -> Alt + Arrow Key

# Windows
bind c new-window -c "#{pane_current_path}"

set -g base-index 1
set-window-option -g pane-base-index 1

# Navigating windows
# Prefix key -> <Number>

# Copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# Integrate with VIM
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

#set -g default-terminal "tmux-256color"
set-option -a terminal-overrides ",*256col*:RGB"

# Navigating panes
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

